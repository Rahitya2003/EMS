{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-6">
            <div class="card shadow profile-edit-card">

                <!-- Card Header -->
                <div class="card-header text-center bg-gradient-primary text-white">
                    <h4 class="mb-0">Edit Profile</h4>
                </div>

                <!-- Card Body -->
                <div class="card-body">

                    <!-- Profile Image -->
                    <div class="text-center mb-4">
                        <img src="{{ url_for('static', filename='images/profile/' + (session.get('profile_pic') or 'default.png')) }}" 
                             alt="Profile Image" 
                             class="profile-img-large shadow-sm">
                    </div>

                    <!-- Edit Profile Form -->
                    <form method="POST" enctype="multipart/form-data">

                        <div class="mb-3">
                            <label for="username" class="form-label">Name</label>
                            <input type="text" id="username" name="username" 
                                   value="{{ user[1] if user else '' }}" 
                                   class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" name="email" 
                                   value="{{ user[4] if user else '' }}" 
                                   class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="role" class="form-label">Role</label>
                            <input type="text" id="role" name="role" 
                                   value="{{ user[3] if user else '' }}" 
                                   class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="profile_pic" class="form-label">Profile Photo</label>
                            <input type="file" id="profile_pic" name="profile_pic" class="form-control">
                        </div>

                        <button type="submit" class="btn btn-gradient w-100">
                            Update Profile
                        </button>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
