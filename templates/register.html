{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-5">
            <div class="card shadow-lg">

                <!-- Card Header -->
                <div class="card-header text-center bg-gradient-primary text-white">
                    <h4 class="mb-0">Register</h4>
                </div>

                <!-- Card Body -->
                <div class="card-body">
                    <form action="/register" method="POST">

                        <div class="mb-3">
                            <label for="id" class="form-label">User ID</label>
                            <input type="text" class="form-control" name="id" id="id" placeholder="Enter User ID" required>
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" name="username" id="username" placeholder="Enter Username" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" id="password" placeholder="Enter Password" required>
                        </div>

                        <div class="mb-3">
                            <label for="role" class="form-label">Role</label>
                            <input type="text" class="form-control" name="role" id="role" placeholder="Enter Role" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" id="email" placeholder="Enter Email" required>
                        </div>

                        <button type="submit" class="btn btn-gradient w-100">
                            Register
                        </button>

                    </form>
                </div>

                <div class="text-center mt-3">
                    <a href="/login" class="text-decoration-none">Already have an account? Login</a>
                </div>

            </div>
        </div>
    </div>
</div>

{% endblock %}
