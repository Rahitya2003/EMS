{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <!-- Welcome Message -->
    <h2 class="text-center mb-4 text-primary">Welcome {{ session['user'] }}</h2>

    <!-- Dashboard Summary Cards -->
    <div class="row g-4">

        <div class="col-12 col-md-4">
            <div class="card dashboard-card bg-gradient-primary text-white shadow-lg">
                <div class="card-body text-center">
                    <i class="bi bi-people-fill display-4 icon-animate"></i>
                    <h5 class="mt-2">Total Employees</h5>
                    <h2>{{ total }}</h2>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="card dashboard-card bg-gradient-success text-white shadow-lg">
                <div class="card-body text-center">
                    <i class="bi bi-diagram-3-fill display-4 icon-animate"></i>
                    <h5 class="mt-2">Departments</h5>
                    <h2>{{ dept }}</h2>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="card dashboard-card bg-gradient-warning text-white shadow-lg">
                <div class="card-body text-center">
                    <i class="bi bi-currency-rupee display-4 icon-animate"></i>
                    <h5 class="mt-2">Highest Salary</h5>
                    <h2>{{ max_salary }}</h2>
                </div>
            </div>
        </div>

    </div>

    <!-- Action Cards -->
    <div class="row g-4 mt-4">

        <div class="col-12 col-md-6">
            <div class="card dashboard-card shadow text-center p-4">
                <h5>Add New Employee</h5>
                <a href="/add_employee" class="btn btn-success mt-2">Add Employee</a>
            </div>
        </div>

        <div class="col-12 col-md-6">
            <div class="card dashboard-card shadow text-center p-4">
                <h5>View Employee List</h5>
                <a href="/view_employee" class="btn btn-primary mt-2">View Employees</a>
            </div>
        </div>

    </div>

</div>

{% endblock %}
